<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Monitor Dashboard – Haylee Torres</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    .ipam-section {
      margin-bottom: 28px;
    }

    /* pixel-panel p is 1.25em which is too large for technical descriptions */
    .pixel-panel .query-explanation {
      font-size: 0.88em;
      color: var(--text-secondary);
      margin-bottom: 14px;
      padding: 6px 14px;
      border-left: 2px solid var(--gold-dim);
    }

    .query-explanation code {
      font-family: 'Courier New', monospace;
      font-size: 0.92em;
      color: var(--gold-bright);
      background: var(--stone-dark);
      padding: 1px 5px;
      border: 1px solid var(--border);
    }

    .code-block {
      background: var(--stone-dark);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold-dim);
      padding: 16px 20px;
      overflow-x: auto;
      margin-bottom: 18px;
      border-radius: 1px;
    }

    .code-block code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8em;
      color: var(--text-primary);
      line-height: 1.55;
      white-space: pre;
    }

    .code-block-scroll {
      max-height: 240px;
      overflow-y: auto;
    }

    .light-theme .code-block {
      background: var(--stone-mid);
      border-color: var(--border-gold);
    }

    .query-screenshot {
      display: block;
      max-width: 100%;
      height: auto;
      border: 1px solid var(--border-gold);
      box-shadow: var(--shadow-deep), 0 0 18px rgba(201,162,39,0.08);
      border-radius: 1px;
      transition: all 0.4s ease;
    }

    .query-screenshot:hover {
      border-color: var(--gold);
      box-shadow: var(--shadow-deep), var(--glow-gold);
      transform: scale(1.01);
    }

    .screenshot-wrap {
      margin-top: 4px;
      overflow-x: auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Cinzel', serif;
      font-size: 0.78em;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      border: 1px solid var(--border-gold);
      background: var(--stone-dark);
      padding: 10px 22px;
      border-radius: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      margin-bottom: 28px;
    }

    .back-link:hover {
      background: var(--gold-dim);
      color: var(--gold-bright);
      border-color: var(--gold);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 12px var(--gold-glow);
      transform: translateY(-2px);
    }

    .project-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 16px;
    }

    /* Network diagram */
    .network-diagram {
      border: 1px solid var(--border-gold);
      background: var(--bg-card);
      padding: 12px;
      margin: 14px 0 20px;
      overflow-x: auto;
    }

    /* Addressing table */
    .ipam-table {
      width: 100%;
      border-collapse: collapse;
      margin: 4px 0 0;
      font-size: 0.8em;
    }
    .ipam-table th {
      font-family: 'Cinzel', serif;
      font-size: 0.74em;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-gold);
      text-align: left;
    }
    .ipam-table td {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: 'Courier New', monospace;
      font-size: 0.95em;
    }
    .ipam-table tbody tr:hover td {
      background: var(--gold-subtle);
      color: var(--text-primary);
    }
  </style>
</head>
